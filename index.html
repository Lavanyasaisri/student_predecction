<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<body>
    <div class="container">
        <h1>AI Student Performance Predictor</h1>
        <form action="/predict" method="post">
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required><br><br>
            
            <label for="study_hours">Study Hours:</label>
            <input type="number" step="0.1" id="study_hours" name="study_hours" required><br><br>
            
            <label for="attendance_rate">Attendance Rate (%):</label>
            <input type="number" step="0.1" id="attendance_rate" name="attendance_rate" required><br><br>
            
            <label for="gpa">GPA:</label>
            <input type="number" step="0.01" id="gpa" name="gpa" required><br><br>
            
            <label for="sleep_hours">Sleep Hours:</label>
            <input type="number" step="0.1" id="sleep_hours" name="sleep_hours" required><br><br>
            
            <label for="gender">Gender:</label>
            <select id="gender" name="gender">
                <option value="Female">Female</option>
                <option value="Male">Male</option>
            </select><br><br>
            
            <label for="major">Major:</label>
            <select id="major" name="major">
                <option value="Arts">Arts</option>
                <option value="Business">Business</option>
                <option value="Education">Education</option>
                <option value="Engineering">Engineering</option>
                <option value="Science">Science</option>
            </select><br><br>
            
            <label for="part_time_job">Part Time Job:</label>
            <select id="part_time_job" name="part_time_job">
                <option value="No">No</option>
                <option value="Yes">Yes</option>
            </select><br><br>
            
            <label for="extra_curricular">Extra Curricular Activities:</label>
            <select id="extra_curricular" name="extra_curricular">
                <option value="No">No</option>
                <option value="Yes">Yes</option>
            </select><br><br>
            
            <label for="grade">Grade:</label>
            <select id="grade" name="grade">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select><br><br>
            
            <div class="button-container">
                <button type="submit">Predict Performance</button>
            </div>
        </form>
        
        {% if prediction %}
            <h2>Predicted Performance Score: {{ prediction }}</h2>
        {% endif %}
    </div>
</body>
    
    {% if prediction %}
        <h2>Predicted Performance Score: {{ prediction }}</h2>
    {% endif %}
</body>
</html>
